<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success | ZyroEditz</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        .glow { text-shadow: 0 0 20px rgba(255, 26, 26, 0.5); }
        textarea::-webkit-scrollbar { width: 6px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background: rgba(255,26,26,0.3); border-radius: 3px; }
        @keyframes yt-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .yt-spinner { animation: yt-spin 0.8s linear infinite; border: 3px solid rgba(255, 255, 255, 0.2); border-top-color: #fff; border-radius: 50%; width: 18px; height: 18px; display: inline-block; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative">
    <div class="fixed inset-0 pointer-events-none opacity-10 z-0" style="background-image: linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px); background-size: 50px 50px;"></div>
    <div class="fixed w-[600px] h-[600px] bg-[#ff1a1a]/5 rounded-full blur-[100px] top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none z-0"></div>

    <div class="max-w-2xl w-full text-center relative z-10 pt-10 pb-10">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-[#ff1a1a]/10 border border-[#ff1a1a]/30 mb-6 shadow-[0_0_30px_rgba(255,26,26,0.2)]">
            <svg class="w-10 h-10 text-[#ff1a1a]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>

        <h1 class="text-4xl md:text-5xl font-black tracking-tight mb-2">Payment <span class="text-[#ff1a1a] glow">Secured</span></h1>
        <p class="text-gray-400 text-sm md:text-lg uppercase tracking-[0.3em] mb-8">Project Initialized</p>
        
        <div class="bg-white/5 border border-white/10 rounded-2xl p-6 md:p-8 backdrop-blur-xl shadow-2xl mb-8 text-left">
            
            <div class="bg-black/40 border border-[#ff1a1a]/30 rounded-xl p-4 mb-6 flex flex-col sm:flex-row items-center justify-between gap-4">
                <div>
                    <h3 class="text-[#ff1a1a] text-xs font-bold uppercase tracking-widest mb-1">Your Unique Order ID</h3>
                    <p class="text-gray-400 text-xs">Copy this ID. When MEGA asks for your name during upload, paste this ID.</p>
                </div>
                <div class="flex items-center gap-2 bg-black/60 px-3 py-2 rounded-lg border border-white/10 w-full sm:w-auto">
                    <span id="displayOrderId" class="text-white font-mono text-sm tracking-wider">Loading...</span>
                    <button id="copyIdBtn" class="text-gray-400 hover:text-white transition-colors ml-2" title="Copy ID">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    </button>
                </div>
            </div>

            <h2 class="text-xl font-bold mb-2 text-white flex items-center gap-2">
                <svg class="w-5 h-5 text-[#ff1a1a]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                Project Brief
            </h2>
            <p class="text-gray-400 text-sm mb-6">Drop your vision, timestamps, or specific requirements below. Once submitted, you'll be redirected to our secure vault.</p>
            
            <div class="relative mb-6">
                <textarea id="projectBrief" rows="5" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-white text-sm focus:outline-none focus:border-[#ff1a1a] focus:ring-1 focus:ring-[#ff1a1a] transition-all shadow-inner placeholder-gray-600 resize-none" placeholder="e.g., 'Make the intro fast-paced. Use the color grading from my last video. Cut out the dead air at 02:15...'"></textarea>
            </div>

            <button id="submitBriefBtn" class="w-full relative overflow-hidden group bg-[#ff1a1a] text-black font-bold uppercase tracking-widest text-sm py-4 rounded-xl hover:bg-white transition-all flex items-center justify-center gap-3">
                <span id="btnText">Submit Brief & Upload Footage</span>
                <svg id="btnIcon" class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
            <div id="statusMsg" class="mt-3 text-center text-xs font-mono hidden"></div>
        </div>
    </div>

    <script>
        // 1. Extract Order ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id') || "ZYRO_UNKNOWN";
        
        // Display the ID for the user to copy
        document.getElementById('displayOrderId').innerText = orderId;

        // 2. SILENT S2S VERIFICATION: Instantly verify payment in the background
        if (orderId && orderId !== "ZYRO_UNKNOWN") {
            fetch('/api/verify-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ order_id: orderId })
            }).then(res => res.json())
              .then(data => console.log("Verification status:", data.status))
              .catch(err => console.error("Verification sync issue:", err));
        }

        // 3. Copy Order ID Functionality
        document.getElementById('copyIdBtn').addEventListener('click', function() {
            navigator.clipboard.writeText(orderId).then(() => {
                const originalHTML = this.innerHTML;
                this.innerHTML = `<svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
                setTimeout(() => { this.innerHTML = originalHTML; }, 2000);
            });
        });

        // 4. Submit Brief & Redirect
        document.getElementById('submitBriefBtn').addEventListener('click', async function() {
            const briefContent = document.getElementById('projectBrief').value.trim();
            const btn = this;
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const statusMsg = document.getElementById('statusMsg');

            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            btnIcon.classList.add('hidden');
            btnText.innerHTML = `<span class="yt-spinner mr-2"></span> Saving to Studio Core...`;
            statusMsg.classList.add('hidden');

            try {
                if (briefContent && orderId !== "ZYRO_UNKNOWN") {
                    const response = await fetch('/api/save-brief', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ orderId: orderId, notes: briefContent })
                    });
                    if (!response.ok) throw new Error("Failed to save brief.");
                }

                btnText.innerHTML = `<span class="yt-spinner mr-2"></span> Redirecting to MEGA...`;
                // REMINDER: Paste your Order ID as your name on MEGA!
                window.location.href = "https://mega.nz/filerequest/I-2hfdO8CCo";

            } catch (error) {
                console.error("Error:", error);
                statusMsg.textContent = "⚠️ Network timeout, redirecting to vault anyway...";
                statusMsg.classList.remove('hidden');
                statusMsg.classList.add('text-[#ff1a1a]');
                
                setTimeout(() => {
                    window.location.href = "https://mega.nz/filerequest/I-2hfdO8CCo";
                }, 1500);
            }
        });
    </script>
</body>
</html>
