<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyroEditz™ | Page Not Found</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" sizes="128x128" href="/favicon.png">
    <meta name="theme-color" content="#ff1a1a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=block">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=block">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050505;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            overflow: hidden;
        }
        .brand-name { font-family: 'Roboto', sans-serif !important; }
        .container {
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }
        .code {
            font-family: 'Roboto', sans-serif;
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #ff1a1a 0%, #cc0000 50%, #ff3333 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.04em;
            margin-bottom: 0.5rem;
            text-shadow: none;
            filter: drop-shadow(0 0 40px rgba(255,26,26,0.3));
        }
        .subtitle {
            font-size: clamp(0.875rem, 2.5vw, 1.25rem);
            color: rgba(255,255,255,0.5);
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }
        .message {
            font-size: clamp(0.8rem, 1.5vw, 0.95rem);
            color: rgba(255,255,255,0.3);
            max-width: 400px;
            margin: 0 auto 2.5rem;
            line-height: 1.7;
        }
        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: #ff1a1a;
            color: #000;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
        }
        .home-btn:hover {
            background: #fff;
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255,26,26,0.3);
        }
        .brand {
            position: fixed;
            bottom: 2rem;
            font-size: 12px;
            color: rgba(255,255,255,0.15);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            z-index: 2;
        }
        .brand span { color: rgba(255,26,26,0.4); }
        /* Animated background orb */
        .orb {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,26,26,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }
        .orb-1 { top: -100px; right: -100px; animation: float1 8s ease-in-out infinite; }
        .orb-2 { bottom: -100px; left: -100px; animation: float2 10s ease-in-out infinite; }
        @keyframes float1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-40px,40px); } }
        @keyframes float2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(40px,-30px); } }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <div class="code">404</div>
        <div class="subtitle">Page Not Found</div>
        <p class="message">The page you're looking for doesn't exist or has been moved. Let's get you back to the studio.</p>
        <a href="/" class="home-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m19 12-7-7-7 7"/><path d="M12 5v14"/></svg>
            Back to Home
        </a>
    </div>

    <div class="brand"><span class="brand-name">Zyro<span>Editz</span></span>&trade;</div>
</body>
</html>
