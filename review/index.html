<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave a Review - ZyroEditz™</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        zyroRed: '#ff1a1a',
                        zyroDark: '#050505',
                        zyroCard: '#111111'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=block">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Outfit', sans-serif; }
        .star-label { cursor: pointer; transition: transform 0.1s; display: inline-block; }
        .star-label:hover { transform: scale(1.2); }
        input[type="radio"] { display: none; }
        
        .stars-container { direction: rtl; display: inline-flex; }
        /* When hovering over a star, light it up and all stars after it (which are visually before it due to rtl) */
        .star-label:hover ~ .star-label,
        .star-label:hover,
        /* When a star is checked, light it up and all stars after it */
        input[type="radio"]:checked ~ .star-label {
            color: #ff1a1a;
            text-shadow: 0 0 10px rgba(255, 26, 26, 0.5);
        }
        .star-label {
            color: #333;
            font-size: 3rem;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-zyroCard border border-gray-800 rounded-2xl p-8 shadow-2xl relative overflow-hidden">
        <!-- Accent line -->
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-zyroRed to-red-900"></div>

        <div class="text-center mb-8">
            <h1 class="text-3xl font-black mb-2">Zyro<span class="text-zyroRed">Editz</span>™</h1>
            <h2 class="text-xl font-bold text-gray-200 mt-6">How was your project?</h2>
            <p class="text-gray-400 text-sm mt-2">Your feedback is incredibly valuable to us and helps us push our limits.</p>
        </div>

        <div id="successMessage" class="hidden text-center py-10">
            <div class="text-green-500 text-6xl mb-4">✓</div>
            <h3 class="text-2xl font-bold mb-2">Review Submitted!</h3>
            <p class="text-gray-400">Thank you for your feedback. We look forward to working with you again.</p>
            <a href="/" class="mt-8 inline-block px-6 py-3 bg-zyroRed text-white font-bold rounded-lg hover:bg-red-700 transition">Return to Home</a>
        </div>

        <form id="reviewForm" class="space-y-6">
            <div class="text-center mb-6">
                <div class="stars-container flex flex-row-reverse justify-center space-x-reverse space-x-2">
                    <input type="radio" id="star5" name="rating" value="5">
                    <label for="star5" class="star-label">★</label>
                    
                    <input type="radio" id="star4" name="rating" value="4">
                    <label for="star4" class="star-label">★</label>
                    
                    <input type="radio" id="star3" name="rating" value="3">
                    <label for="star3" class="star-label">★</label>
                    
                    <input type="radio" id="star2" name="rating" value="2">
                    <label for="star2" class="star-label">★</label>
                    
                    <input type="radio" id="star1" name="rating" value="1">
                    <label for="star1" class="star-label">★</label>
                </div>
                <p id="ratingError" class="text-zyroRed text-sm mt-2 hidden">Please select a rating</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Your Name</label>
                <input type="text" id="clientName" placeholder="John Doe" class="w-full bg-black border border-gray-800 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-zyroRed transition" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Written Review</label>
                <textarea id="reviewText" rows="4" placeholder="Tell us what you loved about the final video..." class="w-full bg-black border border-gray-800 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-zyroRed transition" required></textarea>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-zyroRed text-white font-bold rounded-lg px-4 py-4 hover:bg-red-700 transition flex justify-center items-center shadow-[0_0_20px_rgba(255,26,26,0.3)] mt-8">
                <span class="text-lg">Submit Review</span>
                <svg id="loadingSpinner" class="hidden animate-spin ml-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Get order_id from URL
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('order_id');

            document.getElementById('reviewForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const ratingObj = document.querySelector('input[name="rating"]:checked');
                if (!ratingObj) {
                    document.getElementById('ratingError').classList.remove('hidden');
                    return;
                }
                document.getElementById('ratingError').classList.add('hidden');

                const rating = ratingObj.value;
                const name = document.getElementById('clientName').value;
                const reviewText = document.getElementById('reviewText').value;

                const submitBtn = document.getElementById('submitBtn');
                const loadingSpinner = document.getElementById('loadingSpinner');
                
                submitBtn.disabled = true;
                loadingSpinner.classList.remove('hidden');

                try {
                    // Call the chat.js endpoint with the submitReview action
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'submitReview',
                            order_id: orderId || 'DIRECT_REVIEW',
                            rating: rating,
                            name: name,
                            review_text: reviewText
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        document.getElementById('reviewForm').classList.add('hidden');
                        document.getElementById('successMessage').classList.remove('hidden');
                    } else {
                        alert('Error submitting review: ' + (data.error || 'Please try again.'));
                    }
                } catch (error) {
                    console.error('Submission error:', error);
                    alert('Network error. Please try again.');
                } finally {
                    submitBtn.disabled = false;
                    loadingSpinner.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
